<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accord</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="launcher">
      <section class="panel">
        <p class="eyebrow">Accord v2</p>
        <h1>서버에 연결</h1>
        <form id="serverForm">
          <label>
            <span>서버 주소</span>
            <input id="serverInput" autocomplete="off" spellcheck="false" />
          </label>
          <button type="submit">들어가기</button>
        </form>
        <p class="hint" id="message">서버에서 최신 통화 UI를 받아옵니다.</p>
      </section>
    </main>
    <script src="launcher.js"></script>
  </body>
</html>
