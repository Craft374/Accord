<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'" />
  <link rel="stylesheet" href="../../public/styles.css" />
  <style>
    html, body { width: 100%; height: 100%; margin: 0; background: #11151b; color: #e7ebf2; }
    #memoEditor { width: 720px; height: 520px; }
  </style>
</head>
<body>
  <div id="memoEditor" class="memo-editor"></div>
  <script src="../../public/memo-editor.bundle.js"></script>
  <script>
    window.memoChanges = [];
    window.memoSelections = [];
    window.memoOpenedLinks = [];
    window.memoEditor = window.AccordMemoEditor.create({
      parent: document.querySelector("#memoEditor"),
      onChange: (text) => window.memoChanges.push(text),
      onSelectionChange: (selection) => window.memoSelections.push(selection),
      onOpenLink: (href) => window.memoOpenedLinks.push(href),
    });
    window.memoEditor.setReadOnly(false);
  </script>
</body>
</html>
